name: desktop-ci

on:
  push:
  pull_request:

jobs:
  linux:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build g++ qt6-base-dev qt6-declarative-dev qt6-tools-dev qt6-tools-dev-tools libxkbcommon-dev
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel 2
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Self-test
        run: QT_QPA_PLATFORM=offscreen ./build/media-hit-assistant --self-test
      - name: QML control audit
        run: python3 scripts/audit_qml_controls.py
